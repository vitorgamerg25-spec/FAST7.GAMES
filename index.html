<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAST7.GAMES</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Pixelify+Sans:wght@400..700&display=swap');

:root{
  --bg:#0d0d1a;
  --panel:#181832;
  --panel-2:#22224a;
  --ink:#000000;
  --paper:#f4f4f4;
  --muted:#9a9ac0;
  --red:#e6473d;
  --blue:#2f9bff;
  --green:#4fce5d;
  --yellow:#ffd23f;
  --purple:#b25ee8;
  --shadow-op:1;
}

/* ============ TEMAS ============ */
body[data-theme="dark"]{
  --bg:#0d0d1a; --panel:#181832; --panel-2:#22224a; --ink:#000000; --paper:#f4f4f4; --muted:#9a9ac0;
  --red:#e6473d; --blue:#2f9bff; --green:#4fce5d; --yellow:#ffd23f; --purple:#b25ee8; --shadow-op:1;
}
body[data-theme="light"]{
  --bg:#eef0f7; --panel:#ffffff; --panel-2:#e2e6f2; --ink:#12131a; --paper:#171821; --muted:#5b5f76;
  --red:#d63447; --blue:#1f7ae0; --green:#1f9d55; --yellow:#e2a300; --purple:#8a3fd6; --shadow-op:.35;
}
body[data-theme="playstation"]{
  --bg:#060b18; --panel:#0d1730; --panel-2:#142145; --ink:#ffffff; --paper:#eaf1ff; --muted:#7d93c4;
  --red:#ff4d6d; --blue:#3ba7ff; --green:#2fe3a6; --yellow:#ff5fa8; --purple:#5b6cff; --shadow-op:1;
}
body[data-theme="xbox"]{
  --bg:#0a0f0c; --panel:#0f1a13; --panel-2:#15251a; --ink:#ffffff; --paper:#eafbea; --muted:#7fae82;
  --red:#e6473d; --blue:#2f9bff; --green:#3fce56; --yellow:#a4ff2f; --purple:#107c10; --shadow-op:1;
}
body[data-theme="nintendo"]{
  --bg:#160808; --panel:#210d0d; --panel-2:#2c1111; --ink:#ffffff; --paper:#fff1f1; --muted:#d19a9a;
  --red:#e60012; --blue:#00a1e4; --green:#4fce5d; --yellow:#ffd23f; --purple:#b25ee8; --shadow-op:1;
}
body{transition:background-color .25s, color .25s;}
.pixel-panel,.btn,.icon-btn,.pixel-input,.cabinet,.cabinet-frame{transition:background-color .2s,border-color .2s,color .2s,box-shadow .2s;}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
img,canvas{image-rendering:pixelated;}

body{
  background:
    linear-gradient(180deg, #12122a 0%, var(--bg) 100%);
  color:var(--paper);
  font-family:'Pixelify Sans', monospace;
  font-size:20px;
  min-height:100vh;
  position:relative;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  background-image:
    radial-gradient(circle at 12% 20%, rgba(255,255,255,0.03) 2px, transparent 2px),
    radial-gradient(circle at 68% 60%, rgba(255,255,255,0.025) 2px, transparent 2px);
  background-size:60px 60px, 90px 90px;
}

/* CRT overlay (toggle-able) */
.crt-overlay{
  pointer-events:none;
  position:fixed;
  inset:0;
  z-index:50;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.05) 0px,
    rgba(255,255,255,0.05) 1px,
    transparent 2px,
    transparent 4px
  );
  transition:opacity .2s;
}
body.no-crt .crt-overlay{opacity:0;}

.wrap{max-width:1100px;margin:0 auto;padding:26px 18px 80px;position:relative;z-index:1;}

.screen.hidden{display:none !important;}

/* pixel panel / hard-shadow style used everywhere */
.pixel-panel{
  background:var(--panel);
  border:4px solid var(--ink);
  box-shadow:6px 6px 0 var(--ink);
  border-radius:0;
}

/* Buttons */
.btn{
  font-family:'Press Start 2P', monospace;
  font-size:11px;
  letter-spacing:1px;
  background:var(--panel-2);
  border:3px solid var(--ink);
  color:var(--paper);
  padding:12px 16px;
  cursor:pointer;
  box-shadow:4px 4px 0 var(--ink);
  transition:transform .05s;
}
.btn:hover{filter:brightness(1.15);}
.btn:active{transform:translate(4px,4px);box-shadow:0 0 0 var(--ink);}
.btn-primary{background:var(--red);color:#fff;}
.btn-danger{background:var(--panel-2);color:var(--red);border-color:var(--red);}

/* ============ ENTRY SCREEN ============ */
#screen-entry{
  min-height:80vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.entry-box{
  padding:36px 32px;
  max-width:420px;
  width:100%;
  text-align:center;
}
.logo{
  font-family:'Press Start 2P', monospace;
  font-size:clamp(24px,6.4vw,38px);
  margin:0;
  color:var(--yellow);
  text-shadow:4px 4px 0 var(--red);
  letter-spacing:1px;
  line-height:1.4;
}
.logo-dot{
  display:block;
  font-size:0.5em;
  color:var(--blue);
  text-shadow:3px 3px 0 var(--ink);
  margin-top:6px;
}
.entry-sub{
  font-family:'Press Start 2P', monospace;
  font-size:11px;
  color:var(--blue);
  letter-spacing:3px;
  margin-top:10px;
}
.insert-coin{
  margin-top:22px;
  font-family:'Press Start 2P', monospace;
  font-size:11px;
  color:var(--green);
  letter-spacing:1px;
  animation:blink 1.4s steps(1) infinite;
}
@keyframes blink{50%{opacity:0.15;}}

.entry-form{margin-top:28px;display:flex;flex-direction:column;gap:10px;align-items:stretch;}
.entry-form label{
  font-family:'Press Start 2P', monospace;
  font-size:10px;
  color:var(--muted);
  text-align:left;
  letter-spacing:1px;
}
.pixel-input{
  font-family:'Press Start 2P', monospace;
  font-size:14px;
  background:var(--bg);
  border:3px solid var(--ink);
  color:var(--paper);
  padding:14px 12px;
  box-shadow:4px 4px 0 var(--ink);
  outline:none;
}
.pixel-input:focus{border-color:var(--blue);}
.entry-form .btn{margin-top:8px;}

/* ============ TOPBAR ============ */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:14px 18px;
  margin-bottom:24px;
  flex-wrap:wrap;
}
.player-badge{
  font-family:'Press Start 2P', monospace;
  font-size:11px;
  color:var(--yellow);
  display:flex;
  align-items:center;
  gap:8px;
}
.player-badge::before{content:"🕹";}
.topbar-actions{display:flex;gap:10px;}
.icon-btn{
  font-family:'Press Start 2P', monospace;
  font-size:14px;
  background:var(--panel-2);
  border:3px solid var(--ink);
  color:var(--paper);
  padding:10px 12px;
  cursor:pointer;
  box-shadow:3px 3px 0 var(--ink);
}
.icon-btn:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--ink);}

/* Marquee title on arcade floor */
.marquee{text-align:center;padding:6px 16px 8px;}
.marquee h2{
  font-family:'Press Start 2P', monospace;
  font-size:clamp(20px,5vw,32px);
  color:var(--paper);
  text-shadow:3px 3px 0 var(--purple);
  margin:0 0 8px;
  letter-spacing:2px;
}
.marquee p{color:var(--muted);font-size:18px;letter-spacing:1px;margin:0;}

/* Cabinets grid */
.cabinets-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:24px;
  margin-top:30px;
}
.cabinet{
  --accent:var(--blue);
  background:var(--panel);
  border:4px solid var(--ink);
  box-shadow:6px 6px 0 var(--ink);
  padding:14px;
  cursor:pointer;
  text-align:left;
  font-family:inherit;
  color:var(--paper);
  display:flex;
  flex-direction:column;
  gap:12px;
  transition:transform .06s;
}
.cabinet:hover, .cabinet:focus-visible{outline:none;filter:brightness(1.08);}
.cabinet:active{transform:translate(4px,4px);box-shadow:2px 2px 0 var(--ink);}
.cabinet-marquee{
  font-family:'Press Start 2P', monospace;
  font-size:12px;
  letter-spacing:1px;
  color:var(--accent);
}
.cabinet-screen{
  background:#050510;
  border:3px solid var(--ink);
  height:120px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
}
.cabinet-slot{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  border-top:2px dashed #33335c;
  padding-top:10px;
}
.coin-label{
  font-family:'Press Start 2P', monospace;
  font-size:11px;
  letter-spacing:2px;
  color:var(--accent);
}
.coin-label::before{content:"▶ ";}

/* mini previews */
.preview-velha{display:grid;grid-template-columns:repeat(3,20px);grid-template-rows:repeat(3,20px);gap:4px;}
.preview-velha div{border:2px solid #33335c;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--blue);}
.preview-memoria{display:grid;grid-template-columns:repeat(4,16px);grid-template-rows:repeat(2,16px);gap:4px;}
.preview-memoria div{background:#33335c;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--purple);}
.preview-cobrinha{display:grid;grid-template-columns:repeat(8,10px);grid-template-rows:repeat(6,10px);gap:2px;}
.preview-cobrinha div{background:#0d1f14;}
.preview-cobrinha div.on{background:var(--green);}
.preview-2048{display:grid;grid-template-columns:repeat(2,26px);grid-template-rows:repeat(2,26px);gap:4px;}
.preview-2048 div{background:#33335c;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--yellow);}
.preview-3d{font-size:40px;filter:drop-shadow(3px 3px 0 var(--ink));}

/* Game / settings screens */
.back-btn{
  font-family:'Press Start 2P', monospace;
  background:transparent;
  border:3px solid #33335c;
  color:var(--muted);
  font-size:11px;
  padding:10px 14px;
  cursor:pointer;
  letter-spacing:1px;
  margin-bottom:20px;
}
.back-btn:hover{color:var(--paper);border-color:var(--paper);}

.cabinet-frame{
  --accent:var(--blue);
  background:var(--panel);
  border:4px solid var(--accent);
  box-shadow:6px 6px 0 var(--ink);
  padding:26px;
}
.game-title{
  font-family:'Press Start 2P', monospace;
  font-size:16px;
  color:var(--accent);
  text-shadow:3px 3px 0 var(--ink);
  margin:0 0 18px;
  letter-spacing:1px;
}
.game-status{color:var(--muted);font-size:19px;margin-bottom:14px;min-height:26px;}
.game-controls{display:flex;gap:12px;margin-top:18px;flex-wrap:wrap;}
.score-row{display:flex;gap:22px;font-size:19px;color:var(--paper);margin-bottom:10px;}
.score-row b{color:var(--accent);}

/* Jogo da Velha (com profundidade 3D) */
.velha-board-wrap{perspective:900px;padding:10px;}
.velha-board{
  display:grid;grid-template-columns:repeat(3,90px);grid-template-rows:repeat(3,90px);gap:8px;
  transform:rotateX(8deg);transform-style:preserve-3d;transition:transform .3s;
}
.velha-board-wrap:hover .velha-board{transform:rotateX(4deg) scale(1.02);}
.velha-cell{
  background:#050510;border:2px solid #33335c;
  display:flex;align-items:center;justify-content:center;
  font-family:'Press Start 2P',monospace;font-size:30px;cursor:pointer;color:var(--paper);
  box-shadow:0 6px 0 rgba(0,0,0,calc(0.5 * var(--shadow-op))),0 8px 10px rgba(0,0,0,calc(0.4 * var(--shadow-op)));
  transition:transform .12s, box-shadow .12s;
}
.velha-cell:hover{border-color:var(--accent);transform:translateY(-3px);}
.velha-cell.x{color:var(--blue);text-shadow:0 0 12px var(--blue);}
.velha-cell.o{color:var(--purple);text-shadow:0 0 12px var(--purple);}
.velha-cell.just-placed{animation:mark3d .32s ease-out;}
@keyframes mark3d{
  0%{transform:rotateY(90deg) scale(.4);opacity:0;}
  60%{transform:rotateY(-15deg) scale(1.15);opacity:1;}
  100%{transform:rotateY(0) scale(1);}
}

/* Memoria (flip 3D real) */
.memoria-board{display:grid;grid-template-columns:repeat(4,74px);gap:8px;perspective:1000px;}
@media(max-width:520px){.memoria-board{grid-template-columns:repeat(4,64px);}}
.memoria-card{
  aspect-ratio:1;background:transparent;cursor:pointer;
  transform-style:preserve-3d;position:relative;
  transition:transform .45s cubic-bezier(.2,.7,.3,1);
}
.memoria-card.flipped, .memoria-card.matched{transform:rotateY(180deg);}
.memoria-card.matched{opacity:0.55;cursor:default;}
.memoria-face{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:30px;border:2px solid #33335c;backface-visibility:hidden;
  box-shadow:4px 6px 10px rgba(0,0,0,calc(0.35 * var(--shadow-op)));
}
.memoria-face-back{background:var(--bg);color:var(--accent);}
.memoria-face-front{background:#050510;border-color:var(--accent);transform:rotateY(180deg);}

/* Cobrinha (tabuleiro em perspectiva) */
.snake-3d-wrap{perspective:700px;display:inline-block;}
#cobrinha-canvas{
  background:#050510;border:3px solid #33335c;display:block;max-width:100%;
  transform:rotateX(18deg);transform-origin:center bottom;
  box-shadow:0 30px 40px -10px rgba(0,0,0,calc(0.6 * var(--shadow-op)));
}
.dpad{display:grid;grid-template-columns:repeat(3,50px);grid-template-rows:repeat(3,50px);gap:4px;margin-top:14px;}
.dpad button{
  background:var(--bg);border:2px solid #33335c;color:var(--accent);
  font-size:18px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,calc(0.4*var(--shadow-op)));
}
.dpad button:hover{border-color:var(--accent);}
.dpad button:active{transform:translateY(3px);box-shadow:none;}

/* 2048 (blocos com profundidade e pop) */
.g2048-board{
  display:grid;grid-template-columns:repeat(4,74px);grid-template-rows:repeat(4,74px);gap:8px;
  background:#050510;padding:8px;perspective:800px;
}
@media(max-width:520px){.g2048-board{grid-template-columns:repeat(4,64px);grid-template-rows:repeat(4,64px);}}
.g2048-tile{
  background:#33335c;display:flex;align-items:center;justify-content:center;
  font-family:'Press Start 2P',monospace;font-size:16px;color:var(--paper);
  box-shadow:0 4px 0 rgba(0,0,0,calc(0.45*var(--shadow-op)));
  transition:transform .1s;
}
.g2048-tile[data-v="0"]{background:#181832;box-shadow:none;}
.g2048-tile[data-v="8"]{background:var(--yellow);color:#050510;}
.g2048-tile[data-v="16"]{background:#ffb23e;color:#050510;}
.g2048-tile[data-v="32"]{background:#ff8f3e;color:#050510;}
.g2048-tile[data-v="64"]{background:var(--red);color:#fff;}
.g2048-tile[data-v="128"],.g2048-tile[data-v="256"],.g2048-tile[data-v="512"]{background:var(--purple);color:#fff;font-size:14px;}
.g2048-tile[data-v="1024"],.g2048-tile[data-v="2048"]{background:var(--green);color:#050510;font-size:12px;}
.g2048-tile.pop{animation:tilepop3d .18s ease-out;}
@keyframes tilepop3d{0%{transform:scale(.7) rotateX(30deg);}100%{transform:scale(1) rotateX(0);}}

/* Jogos 3D (Three.js) */
.game3d-canvas-wrap{
  border:4px solid #33335c;background:#000;display:inline-block;max-width:100%;
  box-shadow:6px 6px 0 var(--ink);
}
.game3d-canvas-wrap canvas{display:block;max-width:100%;}
.game3d-hud{display:flex;gap:20px;margin-bottom:10px;flex-wrap:wrap;}

.hint{color:var(--muted);font-size:15px;margin-top:16px;}

/* Settings */
.settings-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  flex-wrap:wrap;
  padding:16px 0;
  border-bottom:2px dashed #33335c;
}
.settings-row:last-of-type{border-bottom:none;}
.settings-row label{
  font-family:'Press Start 2P', monospace;
  font-size:11px;
  color:var(--muted);
  letter-spacing:1px;
}
.settings-name-group{display:flex;gap:10px;flex:1;min-width:220px;}
.settings-name-group .pixel-input{flex:1;box-shadow:none;padding:10px;font-size:12px;}
.settings-feedback{font-size:15px;color:var(--green);min-height:20px;margin-top:10px;}

/* Theme selector */
.settings-row-theme{flex-direction:column;align-items:stretch;}
.theme-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:12px;width:100%;}
.theme-btn{
  display:flex;align-items:center;gap:10px;
  font-family:'Press Start 2P', monospace;font-size:9px;letter-spacing:.5px;
  background:var(--panel-2);border:3px solid #33335c;color:var(--paper);
  padding:10px;cursor:pointer;text-align:left;
}
.theme-btn.active{border-color:var(--yellow);box-shadow:3px 3px 0 var(--yellow);}
.theme-swatch{width:18px;height:18px;border:2px solid var(--ink);flex-shrink:0;}
.theme-swatch-dark{background:linear-gradient(135deg,#0d0d1a,#2f9bff);}
.theme-swatch-light{background:linear-gradient(135deg,#ffffff,#1f7ae0);}
.theme-swatch-ps{background:linear-gradient(135deg,#060b18,#3ba7ff);}
.theme-swatch-xbox{background:linear-gradient(135deg,#0a0f0c,#107c10);}
.theme-swatch-nintendo{background:linear-gradient(135deg,#160808,#e60012);}

/* Admin */
.admin-access{margin-top:22px;padding-top:18px;border-top:2px dashed #33335c;}
.admin-access label{
  font-family:'Press Start 2P', monospace;font-size:11px;color:var(--muted);letter-spacing:1px;
  display:block;margin-bottom:10px;
}
.admin-list{display:flex;flex-direction:column;gap:8px;max-height:55vh;overflow-y:auto;margin:10px 0;}
.admin-entry{
  display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;
  background:var(--panel-2);border:2px solid #33335c;padding:10px 12px;font-size:14px;
}
.admin-entry b{color:var(--yellow);}
.admin-entry .admin-device{color:var(--muted);font-size:12px;width:100%;}

footer{text-align:center;color:var(--muted);font-size:15px;padding:30px 0 10px;letter-spacing:1px;}
</style>

<!-- ===== Backend (Firebase) para o registro "quem entrou" multi-dispositivo =====
     1) Crie um projeto grátis em https://console.firebase.google.com
     2) Ative o "Firestore Database" (modo produção) no menu Build > Firestore Database
     3) Em Regras (Rules), use algo como:
          match /fliperama_entries/{doc} {
            allow create: if true;
            allow read, delete: if true; // troque por auth real se quiser mais segurança
          }
     4) Vá em Configurações do projeto > Geral > "Seus apps" > Web (</>) e copie o firebaseConfig
     5) Cole os valores no objeto FIREBASE_CONFIG logo abaixo, dentro do <script> principal -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<!-- ===== Three.js para os jogos 3D (Corrida 3D e Labirinto 3D) ===== -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div class="crt-overlay"></div>

<div class="wrap">

  <!-- ENTRY / ACCOUNT CREATION SCREEN -->
  <section id="screen-entry" class="screen">
    <div class="entry-box pixel-panel">
      <h1 class="logo">FAST7<span class="logo-dot">.GAMES</span></h1>
      <p class="entry-sub">8-BIT ARCADE</p>
      <div class="insert-coin">◆ PRESSIONE START ◆</div>
      <div id="entry-form" class="entry-form">
        <label for="player-name">DIGITE SEU NOME</label>
        <input id="player-name" class="pixel-input" maxlength="12" placeholder="JOGADOR1" autocomplete="off" />
        <button type="button" id="entry-submit" class="btn btn-primary">COMEÇAR »</button>
      </div>
    </div>
  </section>

  <!-- ARCADE FLOOR SCREEN -->
  <section id="screen-arcade" class="screen hidden">
    <div class="topbar">
      <div class="player-badge" id="player-badge-arcade">JOGADOR1</div>
      <div class="topbar-actions">
        <button class="icon-btn" id="open-settings" title="Configurações">⚙</button>
      </div>
    </div>

    <header class="marquee">
      <h2>ESCOLHA SEU JOGO</h2>
      <p>quatro fichas · quatro telas · escolha a sua</p>
    </header>

    <div class="cabinets-grid">

      <button class="cabinet" data-game="velha" style="--accent:var(--blue)">
        <div class="cabinet-marquee">JOGO DA VELHA</div>
        <div class="cabinet-screen">
          <div class="preview-velha">
            <div>✕</div><div></div><div>○</div>
            <div></div><div>✕</div><div></div>
            <div>○</div><div></div><div>✕</div>
          </div>
        </div>
        <div class="cabinet-slot"><span class="coin-label">JOGAR</span></div>
      </button>

      <button class="cabinet" data-game="memoria" style="--accent:var(--purple)">
        <div class="cabinet-marquee">JOGO DA MEMÓRIA</div>

<script>
/* ---------- storage helpers ---------- */
function safeGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function safeSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function safeRemove(k){ try{ localStorage.removeItem(k); }catch(e){} }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------- ADMIN: troque esta senha! ---------- */
const ADMIN_PASSWORD = "fast7admin";

/* ---------- FIREBASE (backend "quem entrou") ---------- */
/* Preencha com o config do SEU projeto Firebase (veja instruções no <head>). */
const FIREBASE_CONFIG = {
  apiKey: "COLOQUE_AQUI",
  authDomain: "COLOQUE_AQUI.firebaseapp.com",
  projectId: "COLOQUE_AQUI",
  storageBucket: "COLOQUE_AQUI.appspot.com",
  messagingSenderId: "COLOQUE_AQUI",
  appId: "COLOQUE_AQUI"
};
let db = null;
let firebaseReady = false;
try{
  if(FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey !== "COLOQUE_AQUI" && typeof firebase !== 'undefined'){
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    firebaseReady = true;
  }
}catch(e){ console.warn('Firebase não configurado corretamente:', e); }

function logEntry(name){
  if(!firebaseReady) return;
  try{
    db.collection('fliperama_entries').add({
      name: name,
      ts: firebase.firestore.FieldValue.serverTimestamp(),
      device: navigator.userAgent,
      tela: `${screen.width}x${screen.height}`
    });
  }catch(e){ console.warn('Falha ao registrar entrada:', e); }
}

/* ---------- TEMA ---------- */
function applyTheme(theme){
  document.body.setAttribute('data-theme', theme);
  document.querySelectorAll('.theme-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.theme === theme);
  });
  safeSet('fliperama_theme', theme);
}
document.querySelectorAll('.theme-btn').forEach(b=>{
  b.addEventListener('click', ()=>applyTheme(b.dataset.theme));
});
applyTheme(safeGet('fliperama_theme') || 'dark');

/* ---------- screen manager ---------- */
const screens = document.querySelectorAll('.screen');
function showScreen(id){
  screens.forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  window.scrollTo({top:0, behavior:'smooth'});
}

/* ---------- static preview: cobrinha pixels ---------- */
(function(){
  const grid = document.getElementById('preview-snake');
  const cells = 48;
  const onCells = [10,11,12,20,28];
  for(let i=0;i<cells;i++){
    const d = document.createElement('div');
    if(onCells.includes(i)) d.classList.add('on');
    grid.appendChild(d);
  }
})();

/* ---------- CRT toggle ---------- */
const crtToggleBtn = document.getElementById('settings-crt-toggle');
function applyCrtSetting(){
  const off = safeGet('fliperama_crt_off') === '1';
  document.body.classList.toggle('no-crt', off);
  crtToggleBtn.textContent = off ? 'DESLIGADO' : 'LIGADO';
}
crtToggleBtn.addEventListener('click', ()=>{
  const off = safeGet('fliperama_crt_off') === '1';
  safeSet('fliperama_crt_off', off ? '0' : '1');
  applyCrtSetting();
});
applyCrtSetting();

/* ---------- player / entry flow ---------- */
const entrySubmitBtn = document.getElementById('entry-submit');
const playerNameInput = document.getElementById('player-name');
const playerBadgeArcade = document.getElementById('player-badge-arcade');
const settingsNameInput = document.getElementById('settings-name');

function updateNameDisplays(name){
  playerBadgeArcade.textContent = name;
  settingsNameInput.value = name;
}

function submitEntry(){
  const name = (playerNameInput.value || '').trim().toUpperCase().slice(0,12) || 'JOGADOR1';
  safeSet('fliperama_player', name);
  updateNameDisplays(name);
  logEntry(name);
  showScreen('screen-arcade');
}

entrySubmitBtn.addEventListener('click', submitEntry);
playerNameInput.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){
    e.preventDefault();
    submitEntry();
  }
});

const existingPlayer = safeGet('fliperama_player');
if(existingPlayer){
  updateNameDisplays(existingPlayer);
  logEntry(existingPlayer);
  showScreen('screen-arcade');
} else {
  showScreen('screen-entry');
}

/* ---------- settings screen ---------- */
document.getElementById('open-settings').addEventListener('click', ()=>{
  document.getElementById('settings-feedback').textContent = '';
  showScreen('screen-settings');
});
document.getElementById('settings-back').addEventListener('click', ()=>showScreen('screen-arcade'));

document.getElementById('settings-save-name').addEventListener('click', ()=>{
  const name = (settingsNameInput.value || '').trim().toUpperCase().slice(0,12) || 'JOGADOR1';
  safeSet('fliperama_player', name);
  updateNameDisplays(name);
  const fb = document.getElementById('settings-feedback');
  fb.textContent = 'NOME SALVO!';
  setTimeout(()=>{ fb.textContent=''; }, 1800);
});

document.getElementById('settings-reset-scores').addEventListener('click', ()=>{
  safeRemove('fliperama_snake_best');
  safeRemove('fliperama_2048_best');
  const fb = document.getElementById('settings-feedback');
  fb.textContent = 'RECORDES ZERADOS!';
  setTimeout(()=>{ fb.textContent=''; }, 1800);
});

document.getElementById('settings-logout').addEventListener('click', ()=>{
  safeRemove('fliperama_player');
  playerNameInput.value = '';
  showScreen('screen-entry');
});

/* ---------- ADMIN: quem entrou ---------- */
let adminUnsub = null;
document.getElementById('admin-enter').addEventListener('click', ()=>{
  const pwInput = document.getElementById('admin-password');
  const fb = document.getElementById('settings-feedback');
  if(pwInput.value === ADMIN_PASSWORD){
    pwInput.value = '';
    openAdmin();
  } else {
    fb.textContent = 'SENHA INCORRETA';
    setTimeout(()=>{ fb.textContent=''; }, 1800);
  }
});
document.getElementById('admin-password').addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){ e.preventDefault(); document.getElementById('admin-enter').click(); }
});

function openAdmin(){
  showScreen('screen-admin');
  const listEl = document.getElementById('admin-list');
  const statusEl = document.getElementById('admin-status');

  if(!firebaseReady){
    statusEl.textContent = 'Firebase não configurado. Preencha FIREBASE_CONFIG no início do <script> (veja instruções no <head> do arquivo) para ver acessos de todos os dispositivos.';
    listEl.innerHTML = '';
    return;
  }

  statusEl.textContent = '🔴 AO VIVO — atualiza automaticamente';
  if(adminUnsub) adminUnsub();
  adminUnsub = db.collection('fliperama_entries').orderBy('ts','desc').limit(200)
    .onSnapshot(snap=>{
      listEl.innerHTML = '';
      if(snap.empty){
        listEl.innerHTML = '<p class="hint">Nenhum acesso registrado ainda.</p>';
        return;
      }
      snap.forEach(doc=>{
        const d = doc.data();
        const when = (d.ts && d.ts.toDate) ? d.ts.toDate().toLocaleString('pt-BR') : 'agora mesmo';
        const row = document.createElement('div');
        row.className = 'admin-entry';
        row.innerHTML = `<span>👤 <b>${escapeHtml(d.name||'?')}</b></span><span>${when}</span><span class="admin-device">${escapeHtml(d.device||'')} · ${escapeHtml(d.tela||'')}</span>`;
        listEl.appendChild(row);
      });
    }, err=>{
      statusEl.textContent = 'Erro ao carregar registros: ' + err.message;
    });
}

document.getElementById('admin-back').addEventListener('click', ()=>{
  if(adminUnsub){ adminUnsub(); adminUnsub = null; }
  showScreen('screen-settings');
});

document.getElementById('admin-clear').addEventListener('click', async ()=>{
  if(!firebaseReady) return;
  if(!confirm('Apagar TODOS os registros de acesso? Isso não pode ser desfeito.')) return;
  const snap = await db.collection('fliperama_entries').get();
  const batch = db.batch();
  snap.forEach(doc=>batch.delete(doc.ref));
  await batch.commit();
});

/* ---------- game navigation ---------- */
const gameContainer = document.getElementById('game-container');
const backBtn = document.getElementById('back-btn');
let activeCleanup = null;

document.querySelectorAll('.cabinet').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const game = btn.dataset.game;
    gameContainer.innerHTML = '';
    if(game==='velha') activeCleanup = renderVelha(gameContainer);
    if(game==='memoria') activeCleanup = renderMemoria(gameContainer);
    if(game==='cobrinha') activeCleanup = renderCobrinha(gameContainer);
    if(game==='g2048') activeCleanup = render2048(gameContainer);
    if(game==='corrida3d') activeCleanup = renderCorrida3D(gameContainer);
    if(game==='labirinto3d') activeCleanup = renderLabirinto3D(gameContainer);
    showScreen('screen-game');
  });
});

backBtn.addEventListener('click', ()=>{
  if(activeCleanup) activeCleanup();
  activeCleanup = null;
  gameContainer.innerHTML = '';
  showScreen('screen-arcade');
});

/* ================= JOGO DA VELHA ================= */
function renderVelha(root){
  root.innerHTML = `
    <div class="cabinet-frame" style="--accent:var(--blue)">
      <h2 class="game-title">JOGO DA VELHA</h2>
      <div class="game-status" id="velha-status">Vez do jogador ✕</div>
      <div class="velha-board-wrap"><div class="velha-board" id="velha-board"></div></div>
      <div class="game-controls">
        <button class="btn" id="velha-reset">REINICIAR</button>
      </div>
    </div>
  `;
  const boardEl = root.querySelector('#velha-board');
  const statusEl = root.querySelector('#velha-status');
  let board, current, over;

  const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  function init(){
    board = Array(9).fill(null);
    current = 'x';
    over = false;
    draw();
    statusEl.textContent = 'Vez do jogador ✕';
  }

  function draw(lastPlayed){
    boardEl.innerHTML = '';
    board.forEach((v,i)=>{
      const cell = document.createElement('div');
      cell.className = 'velha-cell' + (v ? ' '+v : '') + (i===lastPlayed ? ' just-placed' : '');
      cell.textContent = v ? (v==='x'?'✕':'○') : '';
      cell.addEventListener('click', ()=>play(i));
      boardEl.appendChild(cell);
    });
  }

  function play(i){
    if(over || board[i]) return;
    board[i] = current;
    const winLine = wins.find(([a,b,c])=>board[a] && board[a]===board[b] && board[a]===board[c]);
    if(winLine){
      over = true;
      statusEl.textContent = `Jogador ${current==='x'?'✕':'○'} venceu!`;
    } else if(board.every(Boolean)){
      over = true;
      statusEl.textContent = 'Empate!';
    } else {
      current = current === 'x' ? 'o' : 'x';
      statusEl.textContent = `Vez do jogador ${current==='x'?'✕':'○'}`;
    }
    draw(i);
  }

  root.querySelector('#velha-reset').addEventListener('click', init);
  init();
  return ()=>{};
}

/* ================= JOGO DA MEMÓRIA ================= */
function renderMemoria(root){
  root.innerHTML = `
    <div class="cabinet-frame" style="--accent:var(--purple)">
      <h2 class="game-title">JOGO DA MEMÓRIA</h2>
      <div class="score-row">Movimentos: <b id="memoria-moves">0</b> &nbsp; Pares: <b id="memoria-pairs">0</b>/8</div>
      <div class="game-status" id="memoria-status">Encontre os pares!</div>
      <div class="memoria-board" id="memoria-board"></div>
      <div class="game-controls">
        <button class="btn" id="memoria-reset">REINICIAR</button>
      </div>
    </div>
  `;
  const icons = ['👾','🕹️','👻','⭐','🍄','🎮','🏆','💎'];
  const boardEl = root.querySelector('#memoria-board');
  const movesEl = root.querySelector('#memoria-moves');
  const pairsEl = root.querySelector('#memoria-pairs');
  const statusEl = root.querySelector('#memoria-status');
  let cards, flipped, matched, moves, lock;

  function init(){
    cards = [...icons, ...icons]
      .map(v=>({v, key:Math.random()}))
      .sort((a,b)=>a.key-b.key);
    flipped = [];
    matched = new Set();
    moves = 0;
    lock = false;
    movesEl.textContent = '0';
    pairsEl.textContent = '0';
    statusEl.textContent = 'Encontre os pares!';
    draw();
  }

  function draw(){
    boardEl.innerHTML = '';
    cards.forEach((c,i)=>{
      const el = document.createElement('div');
      const isOpen = flipped.includes(i) || matched.has(i);
      el.className = 'memoria-card' + (isOpen?' flipped':'') + (matched.has(i)?' matched':'');
      el.innerHTML = `<div class="memoria-face memoria-face-back">❔</div><div class="memoria-face memoria-face-front">${c.v}</div>`;
      el.addEventListener('click', ()=>flip(i));
      boardEl.appendChild(el);
    });
  }

  function flip(i){
    if(lock || flipped.includes(i) || matched.has(i)) return;
    flipped.push(i);
    draw();
    if(flipped.length===2){
      moves++;
      movesEl.textContent = moves;
      lock = true;
      const [a,b] = flipped;
      if(cards[a].v === cards[b].v){
        matched.add(a); matched.add(b);
        pairsEl.textContent = matched.size/2;
        flipped = [];
        lock = false;
        draw();
        if(matched.size === cards.length){
          statusEl.textContent = `Parabéns! Você venceu em ${moves} movimentos.`;
        }
      } else {
        setTimeout(()=>{
          flipped = [];
          lock = false;
          draw();
        }, 700);
      }
    }
  }

  root.querySelector('#memoria-reset').addEventListener('click', init);
  init();
  return ()=>{};
}

/* ================= COBRINHA (SNAKE) ================= */
function renderCobrinha(root){
  root.innerHTML = `
    <div class="cabinet-frame" style="--accent:var(--green)">
      <h2 class="game-title">COBRINHA</h2>
      <div class="score-row">Pontos: <b id="snake-score">0</b> &nbsp; Recorde: <b id="snake-best">0</b></div>
      <div class="game-status" id="snake-status">Use as setas ou WASD para jogar</div>
      <div class="snake-3d-wrap"><canvas id="cobrinha-canvas" width="320" height="320"></canvas></div>
      <div class="dpad">
        <div></div><button id="dp-up">▲</button><div></div>
        <button id="dp-left">◀</button><div></div><button id="dp-right">▶</button>
        <div></div><button id="dp-down">▼</button><div></div>
      </div>
      <div class="game-controls">
        <button class="btn" id="snake-reset">REINICIAR</button>
      </div>
      <div class="hint">Pausar: barra de espaço</div>
    </div>
  `;
  const canvas = root.querySelector('#cobrinha-canvas');
  const ctx = canvas.getContext('2d');
  const cell = 16;
  const cols = canvas.width / cell;
  const rows = canvas.height / cell;
  const scoreEl = root.querySelector('#snake-score');
  const bestEl = root.querySelector('#snake-best');
  const statusEl = root.querySelector('#snake-status');
  let best = Number(safeGet('fliperama_snake_best') || 0);
  bestEl.textContent = best;

  let snake, dir, nextDir, food, score, over, timer;

  function placeFood(){
    let pos;
    do{
      pos = {x:Math.floor(Math.random()*cols), y:Math.floor(Math.random()*rows)};
    }while(snake.some(s=>s.x===pos.x && s.y===pos.y));
    food = pos;
  }

  function init(){
    snake = [{x:8,y:8},{x:7,y:8},{x:6,y:8}];
    dir = {x:1,y:0};
    nextDir = {x:1,y:0};
    score = 0;
    over = false;
    scoreEl.textContent = 0;
    statusEl.textContent = 'Use as setas ou WASD para jogar';
    placeFood();
    if(timer) clearInterval(timer);
    timer = setInterval(tick, 110);
    draw();
  }

  function tick(){
    if(over) return;
    dir = nextDir;
    const head = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};

    if(head.x<0 || head.x>=cols || head.y<0 || head.y>=rows || snake.some(s=>s.x===head.x && s.y===head.y)){
      over = true;
      clearInterval(timer);
      statusEl.textContent = 'Fim de jogo! Aperte reiniciar.';
      if(score>best){
        best = score;
        bestEl.textContent = best;
        safeSet('fliperama_snake_best', best);
      }
      return;
    }

    snake.unshift(head);
    if(head.x===food.x && head.y===food.y){
      score++;
      scoreEl.textContent = score;
      placeFood();
    } else {
      snake.pop();
    }
    draw();
  }

  function draw3dBlock(x,y,size,topColor,sideColor){
    const depth = 4;
    ctx.fillStyle = sideColor;
    ctx.fillRect(x, y+size-depth, size, depth);
    ctx.fillRect(x+size-depth, y, depth, size);
    ctx.fillStyle = topColor;
    ctx.fillRect(x, y, size-depth, size-depth);
  }

  function draw(){
    ctx.fillStyle = '#050510';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    draw3dBlock(food.x*cell+2, food.y*cell+2, cell-4, '#ff6b5e', '#8f261f');
    snake.forEach((s,i)=>{
      draw3dBlock(s.x*cell+1, s.y*cell+1, cell-2, i===0 ? '#6fe97e' : '#4fce5d', '#1c5427');
    });
  }

  function setDir(x,y){
    if(dir.x === -x && dir.y === -y) return;
    nextDir = {x,y};
  }

  function keyHandler(e){
    const k = e.key.toLowerCase();
    if(['arrowup','w'].includes(k)) setDir(0,-1);
    else if(['arrowdown','s'].includes(k)) setDir(0,1);
    else if(['arrowleft','a'].includes(k)) setDir(-1,0);
    else if(['arrowright','d'].includes(k)) setDir(1,0);
    else if(k===' '){
      if(timer){ clearInterval(timer); timer=null; statusEl.textContent='Pausado'; }
      else if(!over){ timer=setInterval(tick,110); statusEl.textContent=''; }
    }
  }

  document.addEventListener('keydown', keyHandler);
  root.querySelector('#dp-up').addEventListener('click', ()=>setDir(0,-1));
  root.querySelector('#dp-down').addEventListener('click', ()=>setDir(0,1));
  root.querySelector('#dp-left').addEventListener('click', ()=>setDir(-1,0));
  root.querySelector('#dp-right').addEventListener('click', ()=>setDir(1,0));
  root.querySelector('#snake-reset').addEventListener('click', init);

  init();
  return ()=>{
    document.removeEventListener('keydown', keyHandler);
    if(timer) clearInterval(timer);
  };
}

/* ================= 2048 ================= */
function render2048(root){
  root.innerHTML = `
    <div class="cabinet-frame" style="--accent:var(--yellow)">
      <h2 class="game-title">2048</h2>
      <div class="score-row">Pontos: <b id="g2048-score">0</b> &nbsp; Recorde: <b id="g2048-best">0</b></div>
      <div class="game-status" id="g2048-status">Use as setas para juntar os blocos</div>
      <div class="g2048-board" id="g2048-board"></div>
      <div class="game-controls">
        <button class="btn" id="g2048-reset">NOVO JOGO</button>
      </div>
      <div class="hint">Em celular: deslize o dedo sobre o tabuleiro</div>
    </div>
  `;
  const boardEl = root.querySelector('#g2048-board');
  const scoreEl = root.querySelector('#g2048-score');
  const bestEl = root.querySelector('#g2048-best');
  const statusEl = root.querySelector('#g2048-status');
  let grid, score, best, over;

  best = Number(safeGet('fliperama_2048_best') || 0);
  bestEl.textContent = best;

  function init(){
    grid = Array.from({length:4},()=>Array(4).fill(0));
    score = 0;
    over = false;
    scoreEl.textContent = 0;
    statusEl.textContent = 'Use as setas para juntar os blocos';
    addTile(); addTile();
    draw();
  }

  function addTile(){
    const empty = [];
    for(let r=0;r<4;r++) for(let c=0;c<4;c++) if(grid[r][c]===0) empty.push([r,c]);
    if(!empty.length) return;
    const [r,c] = empty[Math.floor(Math.random()*empty.length)];
    grid[r][c] = Math.random()<0.9 ? 2 : 4;
  }

  function draw(justMoved){
    boardEl.innerHTML = '';
    for(let r=0;r<4;r++){
      for(let c=0;c<4;c++){
        const v = grid[r][c];
        const t = document.createElement('div');
        t.className = 'g2048-tile' + (justMoved && v ? ' pop' : '');
        t.dataset.v = v;
        t.textContent = v || '';
        boardEl.appendChild(t);
      }
    }
  }

  function slideRow(row){
    let arr = row.filter(v=>v!==0);
    let moved = false;
    for(let i=0;i<arr.length-1;i++){
      if(arr[i] === arr[i+1]){
        arr[i]*=2;
        score += arr[i];
        arr.splice(i+1,1);
        moved = true;
      }
    }
    while(arr.length<4) arr.push(0);
    if(arr.some((v,i)=>v!==row[i])) moved = true;
    return {arr, moved};
  }

  function rotateGrid(g){
    const n = 4;
    const res = Array.from({length:n},()=>Array(n).fill(0));
    for(let r=0;r<n;r++) for(let c=0;c<n;c++) res[c][n-1-r] = g[r][c];
    return res;
  }

  function move(dir){
    if(over) return;
    let moved = false;
    let rotations = {left:0, up:3, right:2, down:1}[dir];
    let g = grid;
    for(let i=0;i<rotations;i++) g = rotateGrid(g);

    const newGrid = [];
    for(let r=0;r<4;r++){
      const {arr, moved:m} = slideRow(g[r]);
      if(m) moved = true;
      newGrid.push(arr);
    }

    let restored = newGrid;
    for(let i=0;i<(4-rotations)%4;i++) restored = rotateGrid(restored);

    if(moved){
      grid = restored;
      scoreEl.textContent = score;
      if(score>best){ best=score; bestEl.textContent=best; safeSet('fliperama_2048_best', best); }
      addTile();
      draw(true);
      checkEnd();
    }
  }

  function checkEnd(){
    for(let r=0;r<4;r++) for(let c=0;c<4;c++){
      if(grid[r][c]===2048){ over=true; statusEl.textContent='Você fez o 2048! 🎉'; return; }
    }
    const hasEmpty = grid.some(row=>row.some(v=>v===0));
    if(hasEmpty) return;
    for(let r=0;r<4;r++) for(let c=0;c<4;c++){
      const v = grid[r][c];
      if(c<3 && grid[r][c+1]===v) return;
      if(r<3 && grid[r+1][c]===v) return;
    }
    over = true;
    statusEl.textContent = 'Fim de jogo! Nenhum movimento possível.';
  }

  function keyHandler(e){
    const map = {ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down'};
    if(map[e.key]){ e.preventDefault(); move(map[e.key]); }
  }

  let touchStart = null;
  function touchStartHandler(e){ touchStart = e.touches[0]; }
  function touchEndHandler(e){
    if(!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.clientX;
    const dy = t.clientY - touchStart.clientY;
    if(Math.max(Math.abs(dx),Math.abs(dy)) > 20){
      if(Math.abs(dx) > Math.abs(dy)) move(dx>0 ? 'right':'left');
      else move(dy>0 ? 'down':'up');
    }
    touchStart = null;
  }

  document.addEventListener('keydown', keyHandler);
  boardEl.addEventListener('touchstart', touchStartHandler);
  boardEl.addEventListener('touchend', touchEndHandler);
  root.querySelector('#g2048-reset').addEventListener('click', init);

  init();
  return ()=>{
    document.removeEventListener('keydown', keyHandler);
    boardEl.removeEventListener('touchstart', touchStartHandler);
    boardEl.removeEventListener('touchend', touchEndHandler);
  };
}

/* ================= CORRIDA 3D (Three.js) ================= */
function renderCorrida3D(root){
  root.innerHTML = `
    <div class="cabinet-frame" style="--accent:var(--red)">
      <h2 class="game-title">CORRIDA 3D</h2>
      <div class="score-row">Distância: <b id="corrida-score">0</b> m &nbsp; Recorde: <b id="corrida-best">0</b> m</div>
      <div class="game-status" id="corrida-status">Use ◀ ▶ ou A/D para desviar dos obstáculos</div>
      <div class="game3d-canvas-wrap" id="corrida-canvas-wrap"></div>
      <div class="dpad" style="grid-template-columns:repeat(2,60px);grid-template-rows:60px;">
        <button id="corrida-left">◀</button><button id="corrida-right">▶</button>
      </div>
      <div class="game-controls">
        <button class="btn" id="corrida-reset">REINICIAR</button>
      </div>
    </div>
  `;

  if(typeof THREE === 'undefined'){
    root.querySelector('.cabinet-frame').innerHTML += '<p class="hint">Não foi possível carregar o motor 3D (Three.js). Verifique sua conexão com a internet.</p>';
    return ()=>{};
  }

  const wrap = root.querySelector('#corrida-canvas-wrap');
  const scoreEl = root.querySelector('#corrida-score');
  const bestEl = root.querySelector('#corrida-best');
  const statusEl = root.querySelector('#corrida-status');
  let best = Number(safeGet('fliperama_corrida_best') || 0);
  bestEl.textContent = best;

  const W = Math.min(560, (root.clientWidth || 560) - 20);
  const H = Math.round(W * 0.62);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a18);
  scene.fog = new THREE.Fog(0x0a0a18, 20, 70);

  const camera = new THREE.PerspectiveCamera(65, W/H, 0.1, 200);
  const renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(W, H);
  wrap.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0x8888aa, 0.7));
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
  dirLight.position.set(5,10,5);
  scene.add(dirLight);

  const laneX = [-2.2, 0, 2.2];
  const road = new THREE.Mesh(new THREE.PlaneGeometry(8, 140), new THREE.MeshStandardMaterial({color:0x22223a}));
  road.rotation.x = -Math.PI/2;
  road.position.z = -60;
  scene.add(road);

  const markerGeo = new THREE.BoxGeometry(0.12, 0.02, 1.4);
  const markerMat = new THREE.MeshStandardMaterial({color:0xffd23f});
  const markers = [];
  for(let i=0;i<24;i++){
    [-1.1,1.1].forEach(mx=>{
      const m = new THREE.Mesh(markerGeo, markerMat);
      m.position.set(mx, 0.02, 5 - i*6);
      scene.add(m);
      markers.push(m);
    });
  }

  const car = new THREE.Mesh(new THREE.BoxGeometry(1, 0.6, 1.8), new THREE.MeshStandardMaterial({color:0xe6473d}));
  car.position.set(0, 0.35, 2);
  scene.add(car);

  let lane = 1;
  let carX = laneX[1];

  const obstacles = [];
  const obsGeo = new THREE.BoxGeometry(1, 1, 1);
  const obsColors = [0x2f9bff, 0xb25ee8, 0xffd23f, 0x4fce5d];

  function spawnObstacle(){
    const l = Math.floor(Math.random()*3);
    const color = obsColors[Math.floor(Math.random()*obsColors.length)];
    const mesh = new THREE.Mesh(obsGeo, new THREE.MeshStandardMaterial({color}));
    mesh.position.set(laneX[l], 0.5, -70);
    scene.add(mesh);
    obstacles.push(mesh);
  }

  let running = false;
  let speed = 0.28;
  let distance = 0;
  let spawnTimer = 2;
  let raf = null;

  function moveLane(delta){ lane = Math.max(0, Math.min(2, lane + delta)); }
  function keyHandler(e){
    const k = e.key.toLowerCase();
    if(k==='arrowleft' || k==='a') moveLane(-1);
    else if(k==='arrowright' || k==='d') moveLane(1);
  }
  document.addEventListener('keydown', keyHandler);
  root.querySelector('#corrida-left').addEventListener('click', ()=>moveLane(-1));
  root.querySelector('#corrida-right').addEventListener('click', ()=>moveLane(1));

  function gameOver(){
    running = false;
    statusEl.textContent = 'Bateu! Distância final: ' + Math.floor(distance) + ' m — aperte reiniciar';
    if(distance > best){
      best = Math.floor(distance);
      bestEl.textContent = best;
      safeSet('fliperama_corrida_best', best);
    }
  }

  function animate(){
    if(!running) return;
    raf = requestAnimationFrame(animate);

    carX += (laneX[lane] - carX) * 0.18;
    car.position.x = carX;
    car.rotation.z = (laneX[lane]-carX) * -0.15;

    distance += speed;
    speed = Math.min(0.7, 0.28 + distance*0.0015);
    scoreEl.textContent = Math.floor(distance);

    markers.forEach(m=>{
      m.position.z += speed;
      if(m.position.z > 8) m.position.z -= 144;
    });

    spawnTimer -= speed;
    if(spawnTimer <= 0){
      spawnObstacle();
      spawnTimer = Math.max(5, 12 - distance*0.02);
    }

    for(let i=obstacles.length-1;i>=0;i--){
      const o = obstacles[i];
      o.position.z += speed;
      if(o.position.z > 10){
        scene.remove(o);
        obstacles.splice(i,1);
        continue;
      }
      if(o.position.z > 1.2 && o.position.z < 2.8 && Math.abs(o.position.x - carX) < 0.9){
        gameOver();
      }
    }

    camera.position.set(carX*0.4, 3.4, 7);
    camera.lookAt(carX*0.4, 0.5, -8);

    renderer.render(scene, camera);
  }

  function init(){
    running = true;
    distance = 0;
    speed = 0.28;
    spawnTimer = 2;
    lane = 1; carX = laneX[1];
    obstacles.forEach(o=>scene.remove(o));
    obstacles.length = 0;
    scoreEl.textContent = '0';
    statusEl.textContent = 'Use ◀ ▶ ou A/D para desviar dos obstáculos';
    if(raf) cancelAnimationFrame(raf);
    animate();
  }

  root.querySelector('#corrida-reset').addEventListener('click', init);
  init();

  return ()=>{
    running = false;
    if(raf) cancelAnimationFrame(raf);
    document.removeEventListener('keydown', keyHandler);
    obstacles.forEach(o=>scene.remove(o));
    renderer.dispose();
    if(renderer.domElement && renderer.domElement.parentNode) renderer.domElement.parentNode.removeChild(renderer.domElement);
  };
}

/* ================= LABIRINTO 3D (Three.js) ================= */
function renderLabirinto3D(root){
  root.innerHTML = `
    <div class="cabinet-frame" style="--accent:var(--green)">
      <h2 class="game-title">LABIRINTO 3D</h2>
      <div class="score-row">Tempo: <b id="lab-time">0.0</b>s &nbsp; Recorde: <b id="lab-best">--</b>s</div>
      <div class="game-status" id="lab-status">Use as setas ou WASD para encontrar a saída ⭐</div>
      <div class="game3d-canvas-wrap" id="lab-canvas-wrap"></div>
      <div class="dpad">
        <div></div><button id="lab-up">▲</button><div></div>
        <button id="lab-left">◀</button><div></div><button id="lab-right">▶</button>
        <div></div><button id="lab-down">▼</button><div></div>
      </div>
      <div class="game-controls">
        <button class="btn" id="lab-reset">NOVO LABIRINTO</button>
      </div>
    </div>
  `;

  if(typeof THREE === 'undefined'){
    root.querySelector('.cabinet-frame').innerHTML += '<p class="hint">Não foi possível carregar o motor 3D (Three.js). Verifique sua conexão com a internet.</p>';
    return ()=>{};
  }

  const wrap = root.querySelector('#lab-canvas-wrap');
  const timeEl = root.querySelector('#lab-time');
  const bestEl = root.querySelector('#lab-best');
  const statusEl = root.querySelector('#lab-status');
  let best = Number(safeGet('fliperama_labirinto_best') || 0);
  bestEl.textContent = best ? best.toFixed(1) : '--';

  const N = 7;
  const cellSize = 2.4;
  const W = Math.min(560, (root.clientWidth || 560) - 20);
  const H = Math.round(W * 0.7);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x05050f);
  scene.fog = new THREE.Fog(0x05050f, 15, 40);
  const camera = new THREE.PerspectiveCamera(60, W/H, 0.1, 200);
  const renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(W,H);
  wrap.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0x8888aa, 0.6));
  const dl = new THREE.DirectionalLight(0xffffff, 0.8);
  dl.position.set(6,12,4);
  scene.add(dl);

  function genMaze(n){
    const cells = Array.from({length:n},()=>Array.from({length:n},()=>({N:true,S:true,E:true,W:true,visited:false})));
    const stack = [[0,0]];
    cells[0][0].visited = true;
    const dirs = [[0,-1,'N','S'],[0,1,'S','N'],[1,0,'E','W'],[-1,0,'W','E']];
    while(stack.length){
      const [r,c] = stack[stack.length-1];
      const neighbors = [];
      dirs.forEach(([dc,dr,w1,w2])=>{
        const nr=r+dr, nc=c+dc;
        if(nr>=0&&nr<n&&nc>=0&&nc<n&&!cells[nr][nc].visited) neighbors.push([nr,nc,w1,w2]);
      });
      if(neighbors.length){
        const [nr,nc,w1,w2] = neighbors[Math.floor(Math.random()*neighbors.length)];
        cells[r][c][w1] = false;
        cells[nr][nc][w2] = false;
        cells[nr][nc].visited = true;
        stack.push([nr,nc]);
      } else {
        stack.pop();
      }
    }
    return cells;
  }

  let maze = genMaze(N);
  const wallMat = new THREE.MeshStandardMaterial({color:0x2c2c55});
  const floorMat = new THREE.MeshStandardMaterial({color:0x11111f});
  const mazeGroup = new THREE.Group();
  scene.add(mazeGroup);

  function buildMaze(){
    while(mazeGroup.children.length) mazeGroup.remove(mazeGroup.children[0]);
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(N*cellSize, N*cellSize), floorMat);
    floor.rotation.x = -Math.PI/2;
    floor.position.set((N-1)*cellSize/2, 0, (N-1)*cellSize/2);
    mazeGroup.add(floor);

    const wallH = 1.4, wallT = 0.15;
    function addWall(x,z,horizontal){
      const geo = horizontal
        ? new THREE.BoxGeometry(cellSize+wallT, wallH, wallT)
        : new THREE.BoxGeometry(wallT, wallH, cellSize+wallT);
      const m = new THREE.Mesh(geo, wallMat);
      m.position.set(x, wallH/2, z);
      mazeGroup.add(m);
    }

    for(let r=0;r<N;r++){
      for(let c=0;c<N;c++){
        const cx = c*cellSize, cz = r*cellSize;
        const cell = maze[r][c];
        if(cell.N) addWall(cx, cz - cellSize/2, true);
        if(cell.W) addWall(cx - cellSize/2, cz, false);
        if(r===N-1 && cell.S) addWall(cx, cz + cellSize/2, true);
        if(c===N-1 && cell.E) addWall(cx + cellSize/2, cz, false);
      }
    }

    const flag = new THREE.Mesh(
      new THREE.ConeGeometry(0.35, 0.9, 4),
      new THREE.MeshStandardMaterial({color:0xffd23f, emissive:0x664400})
    );
    flag.position.set((N-1)*cellSize, 0.9, (N-1)*cellSize);
    mazeGroup.add(flag);
  }
  buildMaze();

  const player = new THREE.Mesh(
    new THREE.SphereGeometry(0.4, 16, 16),
    new THREE.MeshStandardMaterial({color:0x4fce5d, emissive:0x0b4012})
  );
  scene.add(player);

  let pr=0, pc=0, visX=0, visZ=0, targetX=0, targetZ=0, moving=false, won=false, wonHandled=false;
  let startTime = performance.now();
  let raf = null;

  function tryMove(dr,dc,w1){
    if(moving || won) return;
    const cell = maze[pr][pc];
    if(cell[w1]) return;
    const nr = pr+dr, nc = pc+dc;
    if(nr<0||nr>=N||nc<0||nc>=N) return;
    pr = nr; pc = nc;
    targetX = pc*cellSize; targetZ = pr*cellSize;
    moving = true;
    if(pr===N-1 && pc===N-1) won = true;
  }

  function keyHandler(e){
    const k = e.key.toLowerCase();
    if(k==='arrowup'||k==='w') tryMove(-1,0,'N');
    else if(k==='arrowdown'||k==='s') tryMove(1,0,'S');
    else if(k==='arrowleft'||k==='a') tryMove(0,-1,'W');
    else if(k==='arrowright'||k==='d') tryMove(0,1,'E');
  }
  document.addEventListener('keydown', keyHandler);
  root.querySelector('#lab-up').addEventListener('click', ()=>tryMove(-1,0,'N'));
  root.querySelector('#lab-down').addEventListener('click', ()=>tryMove(1,0,'S'));
  root.querySelector('#lab-left').addEventListener('click', ()=>tryMove(0,-1,'W'));
  root.querySelector('#lab-right').addEventListener('click', ()=>tryMove(0,1,'E'));

  function animate(){
    raf = requestAnimationFrame(animate);

    visX += (targetX - visX) * 0.22;
    visZ += (targetZ - visZ) * 0.22;
    if(Math.abs(targetX-visX)<0.02 && Math.abs(targetZ-visZ)<0.02){
      visX = targetX; visZ = targetZ; moving = false;
    }
    player.position.set(visX, 0.4, visZ);

    camera.position.set(visX, 5.2, visZ + 5.5);
    camera.lookAt(visX, 0, visZ);

    if(!won){
      timeEl.textContent = ((performance.now()-startTime)/1000).toFixed(1);
    } else if(!wonHandled){
      wonHandled = true;
      const t = (performance.now()-startTime)/1000;
      statusEl.textContent = `Você chegou à saída em ${t.toFixed(1)}s! 🎉`;
      if(!best || t < best){
        best = t;
        bestEl.textContent = best.toFixed(1);
        safeSet('fliperama_labirinto_best', best);
      }
    }

    renderer.render(scene, camera);
  }
  animate();

  function init(){
    maze = genMaze(N);
    buildMaze();
    pr=0; pc=0; visX=0; visZ=0; targetX=0; targetZ=0; moving=false; won=false; wonHandled=false;
    startTime = performance.now();
    statusEl.textContent = 'Use as setas ou WASD para encontrar a saída ⭐';
    timeEl.textContent = '0.0';
  }
  root.querySelector('#lab-reset').addEventListener('click', init);

  return ()=>{
    if(raf) cancelAnimationFrame(raf);
    document.removeEventListener('keydown', keyHandler);
    renderer.dispose();
    if(renderer.domElement && renderer.domElement.parentNode) renderer.domElement.parentNode.removeChild(renderer.domElement);
  };
}
</script>
